name: Continuous Deployment

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Heroku
    runs-on: ubuntu-latest
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
      FRONTEND_API_BASE_URL: ${{ secrets.FRONTEND_API_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Build
        run: npm install && npm run build

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Deploy with Heroku buildpack
        run: |
          APP_NAME="${HEROKU_APP_NAME:-bidmart-frontend}"
          if [ -z "$HEROKU_API_KEY" ]; then
            echo "HEROKU_API_KEY is not set"
            exit 1
          fi

          heroku stack:set heroku-22 --app "${APP_NAME}"
          heroku buildpacks:clear --app "${APP_NAME}"
          heroku buildpacks:add heroku/nodejs --app "${APP_NAME}"

          if [ -n "${FRONTEND_API_BASE_URL}" ]; then
            heroku config:set --app "${APP_NAME}" VITE_API_BASE_URL="${FRONTEND_API_BASE_URL}"
          fi

          git remote add heroku "https://heroku:${HEROKU_API_KEY}@git.heroku.com/${APP_NAME}.git"
          git push heroku HEAD:main --force
