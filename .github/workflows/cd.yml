name: Continuous Deployment

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Heroku
    runs-on: ubuntu-latest
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
      FRONTEND_API_BASE_URL: ${{ secrets.FRONTEND_API_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Build
        run: npm install && npm run build

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Deploy container
        run: |
          APP_NAME="${HEROKU_APP_NAME:-bidmart-frontend}"
          if [ -z "$HEROKU_API_KEY" ]; then
            echo "HEROKU_API_KEY is not set"
            exit 1
          fi

          echo "$HEROKU_API_KEY" | docker login --username=_ --password-stdin registry.heroku.com
          docker build --build-arg VITE_API_BASE_URL="${FRONTEND_API_BASE_URL}" -t registry.heroku.com/${APP_NAME}/web .
          docker push registry.heroku.com/${APP_NAME}/web
          heroku stack:set container --app "${APP_NAME}"
          heroku container:release web --app "${APP_NAME}"
